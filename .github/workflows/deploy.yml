name: CI/CD - Build and Deploy

on:
  push:
    branches: [ main, dev ]

env:
  IMAGE_NAME: url-shortener

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build with Maven
        run: mvn -B -DskipTests package

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push Docker image
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build -t ${{ secrets.ACR_LOGIN }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG} .
          docker push ${{ secrets.ACR_LOGIN }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}
        env:
          DOCKER_BUILDKIT: 1

      - name: Set AKS context
        uses: azure/aks-set-context@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          cluster-name: ${{ secrets.AKS_CLUSTER }}
          resource-group: ${{ secrets.AKS_RG }}

      - name: Deploy to AKS
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/secrets.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/postgres-statefulset.yaml
          kubectl apply -f k8s/redis-statefulset.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/ingress.yaml
          kubectl apply -f k8s/hpa.yaml
        env:
          IMAGE_TAG: ${{ github.sha }}

      - name: Smoke test
        run: |
          # Wait for ingress to be provisioned (adjust host/IP)
          sleep 20
          curl -sfS https://example.com/health/ready || (kubectl get pods -n url-shortener && exit 1)
