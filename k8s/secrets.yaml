apiVersion: v1
kind: Secret
metadata:
  name: url-shortener-secrets
  namespace: url-shortener
stringData:
  # Replace placeholders with real values via kubectl or CI (do NOT commit secrets to git)
  POSTGRES_HOST: "postgres.url-shortener.svc.cluster.local"
  POSTGRES_PORT: "5432"
  POSTGRES_USER: "<db-user>"
  POSTGRES_PASSWORD: "<db-password>"
  REDIS_HOST: "redis.url-shortener.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_PASSWORD: "<redis-password>"
  JWT_SECRET: "<jwt-secret>"
  # Example: add ACR credentials or other secrets as needed
