apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: url-shortener-default-deny
  namespace: url-shortener
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: url-shortener
        - namespaceSelector:
            matchLabels:
              name: kube-system
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 53
# Adjust rules to be more restrictive in production (allow only ingress from ingress controller, DB/Redis access from app pods)
