spring:
  profiles:
    active: dev

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/shortener_dev
    username: postgres
    password: postgres
  redis:
    host: localhost
    port: 6379

server:
  port: 8080

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL:jdbc:postgresql://<managed-postgres-fqdn>:5432/shortener}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:password}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 600000
      connection-timeout: 30000
      validation-timeout: 5000
      data-source-properties:
        sslmode: ${DB_SSLMODE:require}
        ssl: ${DB_SSL:true}
  redis:
    host: ${REDIS_HOST:<managed-redis-fqdn>}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASS:}
    timeout: 2s
    ssl: ${REDIS_SSL:true}
    jedis:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5
        max-wait: 500ms
app:
  redis:
    max-retries: ${REDIS_MAX_RETRIES:3}

server:
  port: ${PORT:8080}
